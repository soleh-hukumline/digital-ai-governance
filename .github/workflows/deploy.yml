# ================================================================
# GitHub Pages Auto-Deploy — Digital Governance Watch LNA
# Setiap push ke branch 'main' akan otomatis deploy ke GitHub Pages
# URL: https://soleh-hukumline.github.io/digital-ai-governance
# ================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Bisa trigger manual dari GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Static Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Upload seluruh root folder (index.html + app/ + data/ + system/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
